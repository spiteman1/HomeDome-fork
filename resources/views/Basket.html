<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HomeDome – Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
     href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --hd-orange: #F57C00;       
            --hd-orange-brown: #E67E22; 
            --hd-dark-red: #B03A2E;      
            --hd-black: #000000;
            --hd-grey: #333333;
            --hd-text-muted: #6b7280; }

        * { box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

        body { min-height: 100vh;
           background: #ffffff;
           display: block;
           margin: 0; }

        .page { width: 100%;
           height: 100%;
           margin: 0;
           border: none;
           border-radius: 0;
           box-shadow: none; }

        .top-bar { background: var(--hd-orange);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 16px; }

        .top-logo { display: flex;
            align-items: center;
            gap: 8px; }

        .top-logo img { width: 44px;
            height: 44px;
            border-radius: 8px;
            border: 2px solid #ffffff; }

        .top-logo-text { font-weight: 800;
            font-size: 20px;
            color: #ffffff; }

        .top-search { flex: 1;
            display: flex;
            justify-content: center; }

        .top-search-input { width: 100%;
            max-width: 600px;
            border-radius: 999px;
            border: none;
            padding: 8px 14px;
            font-size: 14px; }

        .top-search-button { margin-left: 8px;
            padding: 8px 16px;
            border-radius: 999px;
            border: none;
            background: var(--hd-dark-red);
            color: white;
            font-size: 14px;
            cursor: pointer; }

        .top-icons { display: flex;
            gap: 28px;
            align-items: center; }

        .icon-item { display: flex;
            flex-direction: column;
            align-items: center;
            color: #ffffff;
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            position: relative;}

        .icon-item i { font-size: 20px;
            margin-bottom: 4px; }

        .icon-item:hover { opacity: 0.8; }

        .icon-badge { position: absolute;
            top: -4px;
            right: -10px;
            min-width: 16px;
            height: 16px;
            padding: 0 4px;
            border-radius: 999px;
            background: #ffffff;
            color: var(--hd-dark-red);
            font-size: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 4px rgba(0,0,0,0.25); }

        .icon-badge.wishlist { background: #ffffff;
            color: #B03A2E; }

        .icon-badge.basket { background: #ffffff;
            color: #B03A2E; }

        .category-bar { background: var(--hd-orange-brown);
            color: #ffffff;
            font-size: 13px;
            padding: 8px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center; }
    
        .category-bar a { color: #ffffff;
            text-decoration: none;
            font-weight: 500;
            white-space: nowrap; }

        .category-bar a:hover { text-decoration: underline;}

        .content { display: flex;
            flex-wrap: wrap;
            background: #ffffff;
            min-height: calc(100vh - 70px); 
            align-items: stretch; }
    </style>
</head>
<body>
<div class="page">

    <header class="top-bar">
        <div class="top-logo">
            <img src="{{ asset('images/homedome-logo.png') }}" alt="HomeDome logo">
            <span class="top-logo-text">HomeDome</span>
        </div>

        <div class="top-search">
            <input class="top-search-input" type="text" placeholder="Search products...">
            <button class="top-search-button">Search</button>
        </div>

        <div class="top-icons">
            <a href="/login" class="icon-item">
                <i class="fa-solid fa-user"></i>
                <span>Account</span>
            </a>
            <a href="/cart" class="icon-item">
                <i class="fa-solid fa-cart-shopping"></i>
                <span>Basket</span>
                <!--Add the cart number after html and css is finished-->
               <!-- <span class="icon-badge basket">{{ $cartCount ?? 0 }}</span> -->
            </a>
        </div>

    </header>
    
    <div class="category-bar">
        <a href="/furniture">Furniture</a>
        <a href="/appliances">Appliances</a>
        <a href="/home-decor">Home Decor</a>
        <a href="/kitchen-ware">Kitchen Ware</a>
        <a href="/lighting">Lighting</a>
    </div>
</div>
<div class="page">

<h2 id="title">Your trolley</h2>
<!--The amount of items the user has should be displayed here-->
<div id="ProductInfo">
    <img src="" alt="ProductImage">
    <p>Items Name</p>
    <button id="delete">Delete</button>
    <select name="quantity">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <p class="price">Price</p>
</select>
</div>
<div id="summary">
    <h3 class="summaryTitle">Order Summary</h3>
    <p id="subtotal">Subtotal</p>
    <!--Here the price without delivery will be displayed-->
    <p id="delivery">Estimated delivery cost</p>
    <!--Here the delivery price will be displayed-->
    <h5 id="total">Total Price:</h5>
    <!--Here the total price will be displayed-->
</div>
<button id="Checkout">Go to Checkout</button>
</div>
<div class="footer">
    
</div>
</body>
</html>
