<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout Page</title>
<style>
       body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #f5ebe0;
}

header {
    background: #74462e;
    color: #fff;
    padding: 18px 40px;
    font-size: 25px;
    font-weight: bold;
}

.container {
    display: flex;
    gap: 40px;
    padding: 40px;
}

.CheckOutDetails, .ItemsSummary {
    background: #fffaf3;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 5px 10px rgb(0,0,0);
}

.CheckOutDetails {
    flex: 2;
}

.ItemsSummary {
    flex: 1;
    height: fit-content;
}
.section-title {
    font-size: 25px;
    font-weight: bolder;
    margin-bottom: 20px;
    color: #804729;    
    padding-top: 10px;
}

.product {
    display: flex;
    gap: 20px;
    padding: 15px 0px;
    border-bottom: 1px solid #e5d3c5;
}

.product img {
    width: 90px;
    height: 90px;
    object-fit: cover;
    border-radius: 8px;
}

.product-details {
    flex: 1;
}

.product-name {
    font-weight: bold;
    margin-bottom: 5px;
    color: #3b2a20;
}

.product-price {
    font-weight: bold;
    color: #c26a2e;
}

.form-group {
    display: flex;
    flex-direction: column;
    margin-bottom: 15px;
}

#DescriptionTitle {
    margin-bottom: 5px;
    color: #6b3e26;
    font-weight: bold;
}

input {
    padding: 12px;
    border: 1px solid #d6bfa9;
    border-radius: 6px;
    background: #fff;
}
.summary-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    color: #3b2a20;    
}

.summary-row p{
    margin: 0;
}

.total {
    font-weight: bold;
    font-size: 20px;
}

.checkout-btn {
    width: 100%;
    padding: 15px;
    background: #c78355;
    color: white;
    border: none;
    font-size: 16px;
    font-weight: bolder;
    margin-top: 20px;
    border-radius: 8px;
}

.checkout-btn:hover {
    background: #a35421;
}

input:invalid{
border: 3px solid red;
}
</style>
</head>

<body>
<header>CHECKOUT</header>

<div class="container">

<div class="CheckOutDetails">
<div class="PersonalDetails">
<div class="section-title">Delivery Details</div>

<div class="form-group">
<p id="DescriptionTitle">Full Name</p>
<input type="text" required pattern="[A-Za-z\s]+" placeholder="Enter your full name" id="Name">
</div>

<div class="form-group">
<p id="DescriptionTitle">Email</p>
<input type="email" required placeholder="Enter in your email address" id="email">
</div>

<div class="form-group">
<p id="DescriptionTitle">Phone Number</p>
<input type="tel" required  inputmode="numeric" placeholder="Optional" minlength="11" id="PhoneNumber">
</div>
</div>

<div class="BillingAddress">
<div class="section-title">Delivery Details</div>


<div class="form-group">
<p id="DescriptionTitle">Address line 1</p>
<input type="text" required placeholder="Enter the your first line of address" id="Address1">
</div>

<div class="form-group">
<p id="DescriptionTitle">Address line 2</p>
<input type="text" required placeholder="Optional" id="Address2">
</div>

<div class="form-group">
<p id="DescriptionTitle">City</p>
<input type="text" required placeholder="Enter in your City" id="city">
</div>

<div class="form-group">
<p id="DescriptionTitle">PostCode</p>
<input type="text" required placeholder="Enter in your Postcode" id="PostCode">
</div>

<div class="form-group">
<p id="DescriptionTitle">Country</p>
<input type="text" required placeholder="Enter in your Country" id="Country">
</div>
</div>

<div class="PaymentInformation">
    <div class="section-title">Payment Type</div>

    <div class="form-group">
<p id="DescriptionTitle">Card Holder Name</p>
<input type="text" required pattern="[A-Za-z\s]+" placeholder="Enter in the name of the Card Holder" id="CHName">
</div>

<div class="form-group">
<p id="DescriptionTitle">Card Number</p>
<input type="text" required pattern="[0-9]{16}" maxlength="16" placeholder="Enter in your cards number" 
id="CardNum">
</div>

<div class="form-group">
<p id="DescriptionTitle">Expiry Date</p>
<input type="month" required placeholder="Enter the cards expiry date" id="ExpDate">
</div>

<div class="form-group">
<p id="DescriptionTitle">CVV</p>
<input type="text" required pattern="[0-9]{3,4}" maxlength="4" placeholder="Enter the CVV" id="CVV">
</div>

</div>
</div>



<div class="ItemsSummary">
<div class="section-title">Your Bag</div>

<div class="product">
<img src="">
<div class="product-details">
<div class="product-name">Oversized Hoodie</div>
<div>Qty: 1</div>
<div class="product-price">£40</div>
</div>
</div>


<div class="summary-row">
<p>Subtotal</p>
<p>£40</p>
</div>

<div class="summary-row">
<p>Delivery</p>
<p>£3.99</p>
</div>

<div class="summary-row total">
<p>Total</p>
<p>£43.99</p>
</div>

<button class="checkout-btn">PLACE ORDER</button>
</div>

</div>
</body>
</html>
