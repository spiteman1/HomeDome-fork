<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Out Page</title>
    <style>

body {
    font-family: Arial, Helvetica, sans-serif;
    background-color: #f5f6fa;
    margin: 0;
    padding: 40px;
}

.CheckOutContainer {
    display: flex;
    gap: 40px;
    align-items: flex-start;
    justify-content: center;
}

.ProductPurchased {
    flex: 1;
    background: rgb(174, 113, 91);
    padding: 25px;
    border-radius: 12px;
}

.ProductPurchased h2 {
    margin-bottom: 20px;
}

.Product {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 15px;
    border-bottom: 1px solid #eee;
}

.Products {
    width: 80px;
    height: 80px;
    object-fit: cover;
    border-radius: 8px;
}

.Information {
    flex: 1;
}

.name {
    font-weight: bold;
    margin-bottom: 5px;
}

.Price {
    color: #555;
}

.Qty {
    font-weight: bold;
}

.Checkout, .PaymentInformation {
    flex: 1;
    background: rgb(229, 155, 99);
    padding: 25px;
    border-radius: 12px;
}

.Group,
.Country,
.City {
    display: flex;
    flex-direction: column;
    margin-bottom: 15px;
}

.Group h4,
.Country h4,
.City h4 {
    margin-bottom: 5px;
    font-size: 14px;
    color: #333;
}

input {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
    transition: 0.2s ease;
}

input:focus{
    border-color: #6c63ff;
    outline: none;
}


#CheckOut {
    width: 100%;
    margin-top: 15px;
    padding: 14px;
    background: #6c63ff;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
}

#CheckOut:hover {
    background: #574fd6;
    transform: translateY(-2px);
}

        </style>
</head>
<body>
    <div class="CheckOutContainer">
<div class="Checkout">
    <div class="CheckoutInformation"> <!--CheckOut Information-->
        <h2 id="DeliveryDetail">Delivery details</h4>
       
        <div class="Name">
        <h4>Full Name</h4>
        <input type="text" id="FullName" >
        </div>

        <div class="PhoneNumber">
        <h4>Phone Number</h4>
        <input type="text" id="PhoneNumber" >
        </div>

        <div class="Address">
        <h4>Address</h4>
        <input type="text" id="Address" >
        </div>

        <div class="PostCode">
        <h4>Postcode</h4>
        <input type="text" id="PostCode" >
        </div>

        <div class="Country">
        <h4>Country</h4>
            <input type="text" id="CountryLocation" >
        </div>

        <div class="City">
        <h4>City </h4>
            <input type="text" id="CityLocation" >
        </div>
    </div>
    <div class="PaymentInformation">

    </div>
     <button id="CheckOut">Check Out</button>
</div>
    <div class="ProductPurchased">
<h2>Products Currently In The Basket</h2>
<div class="List">
<div class="Product">
    <img src="../../public/images/furnture & appliances in a room.png" alt="ItemPicture" class="Products">
    <div class="Information">
        <div class="name">Example</div> <!--Example Product -->
        <div class="Price"></div>
    </div>
    <div class="Qty">2</div> 
    <div class="Price">£25</div>
</div>
</div>
</div>

</div>

</body>
</html>
